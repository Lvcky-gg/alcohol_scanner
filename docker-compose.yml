services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: takehome_backend_dev
    env_file:
      - .env
    environment:
      FLASK_RUN_PORT: 5000
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
      OLLAMA_BASE_URL: http://localhost:11434
      OCR_ENABLE_MKLDNN: "false"
      OCR_ISOLATE_PROCESS: "false"
      OCR_WORKER_TIMEOUT_SECONDS: "180"
    network_mode: host
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: takehome_frontend_dev
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped
